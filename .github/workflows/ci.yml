name: CI (playwright)

# kích hoạt workflow khi có push hoặc pull request vào nhánh main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    # sử dụng OS ubuntu-latest  để chạy job
    runs-on: ubuntu-latest
    # giới hạn thời gian chạy job là 30 phút
    timeout-minutes: 30
  
    steps:
      # B1: lấy code từ repository về
      - name: Pull code from repository (checkout)
        uses: actions/checkout@v4
      
      # B2: cài đặt Node.js (phiên bản 20.0.0 hoặc mới hơn)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # B3: cài đặt các dependencies (library) của dự án
      - name: Install dependencies
        run: npm install

      # B4: tải browser (chromium) để chạy test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # B4.1: Tạo file .env để lưu thông tin đăng nhập (nếu cần)
      - name: Create .env file
        run: |
          echo "USERNAME=${{secrets.USERNAME}}" >> .env
          echo "PASSWORD=${{secrets.PASSWORD}}" >> .env
      # B5: chạy test bằng Playwright
      - name: Run Playwright tests
        run: npx playwright test --project=chromium
      
      # B6: Tạo báo cáo allure (nếu có)
      - name: Generate Allure report
        if: always() # luôn chạy bước này dù test có pass hay fail
        run: |
          # kiểm tra folder allure-results có tồn tại không
          if [ -d "allure-results" ]; then
            # nếu có thì tạo báo cáo allure
            npm run -s allure:generate || true # bỏ qua lỗi nếu có
          else
            echo "No allure-results folder found, skipping report generation."
          fi

      # B7: Upload báo cáo allure lên GitHub Actions (nếu có)
      - name: Upload Allure report
        if: always() # luôn upload dù test có pass hay fail
        uses: actions/upload-artifact@v4
        with:
          name: playwright-allure-report
          # nếu không tìm thấy file nào để upload thì báo warning, ko cho fail job
          if-no-files-found: warn
          # liệt kê tất cả file cần upload
          path: |
            playwright-report/
            allure-results/
            allure-report/
            test-results/

      # 8) Gửi thông báo tổng hợp lên Slack (Incoming Webhook).
      #    Bạn cần set secret `SLACK_WEBHOOK_URL` trong GitHub repo.
      - name: Send Slack summary
        if: always()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(cat <<EOF
          {
            "text": "*Playwright CI*\nRepo: ${REPO}\nStatus: ${STATUS}\nRun: ${RUN_URL}"
          }
          EOF
          )
          curl -X POST -H "Content-Type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"